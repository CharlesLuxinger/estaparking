spring:
  application:
    name: estaparking-test
  datasource:
    url: jdbc:mysql://localhost:3306/estaparking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 3003

simulator:
  base-url: http://localhost:3000
  startup-sync:
    enabled: true

logging:
  level:
    com.charlesluxinger.estaparking: DEBUG