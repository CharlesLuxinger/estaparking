spring:
  datasource:
    url: ${DB_TEST_URL:${DB_URL:jdbc:mysql://localhost:3306/estaparking_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
    username: ${DB_TEST_USERNAME:${DB_USERNAME:estaparking}}
    password: ${DB_TEST_PASSWORD:${DB_PASSWORD:estaparking}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    validate-on-migrate: true
